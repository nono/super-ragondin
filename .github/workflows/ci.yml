name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: gui-frontend/package-lock.json
      - name: Build frontend
        working-directory: gui-frontend
        run: npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: gui-frontend-dist
          path: gui-frontend/dist/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-rust"
      - uses: ./.github/actions/install-system-deps
      - name: Run tests
        env:
          PROPTEST_CASES: 500
        run: cargo test

  clippy:
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: gui-frontend-dist
          path: gui-frontend/dist/
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-rust"
          save-if: false
      - uses: ./.github/actions/install-system-deps
      - name: Run clippy
        run: cargo clippy --all-features --no-deps -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  e2e:
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: gui-frontend-dist
          path: gui-frontend/dist/
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-rust"
          save-if: false
      - uses: ./.github/actions/install-system-deps
      - name: Install e2e system dependencies
        run: sudo apt-get install -y xvfb webkit2gtk-driver
      - name: Cache tauri-driver
        id: cache-tauri-driver
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/tauri-driver
          key: tauri-driver-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Install tauri-driver
        if: steps.cache-tauri-driver.outputs.cache-hit != 'true'
        run: cargo install tauri-driver --locked
      - name: Build GUI binary
        run: cargo build -p super-ragondin-gui --no-default-features --features custom-protocol
      - name: Run e2e tests
        run: xvfb-run cargo test -p gui-e2e -- --ignored

  integration:
    runs-on: ubuntu-latest
    env:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-rust"
          save-if: false
      - uses: ./.github/actions/install-system-deps
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Setup CouchDB
        id: setup-couchdb
        uses: taratatach/couchdb-action@v4.6-dev
        with:
          couchdb version: '3.4.2'
          couchdb user: ${{ env.COUCHDB_USER }}
          couchdb password: ${{ env.COUCHDB_PASSWORD }}
      - name: Install cozy-stack
        run: go install github.com/cozy/cozy-stack@latest
      - name: Start cozy-stack
        env:
          COZY_COUCHDB_URL: ${{ steps.setup-couchdb.outputs.couchdb-url }}
        run: |
          mkdir -p /tmp/cozy-storage
          cozy-stack serve --fs-url "file:///tmp/cozy-storage" --log-level warning &
          until cozy-stack instances ls 2>/dev/null; do
            echo "Waiting for cozy-stack..."
            sleep 1
          done
      - name: Run integration tests
        run: cargo test --test integration_tests -- --ignored
