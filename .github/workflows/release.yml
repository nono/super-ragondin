name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-system-deps
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: gui-frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: gui-frontend
      - name: Build frontend
        run: npm run build
        working-directory: gui-frontend
      - name: Build release binaries
        run: cargo build --release --locked --bin super-ragondin
      - name: Build GUI release binary
        run: cargo build --release --locked -p super-ragondin-gui --features custom-protocol
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/super-ragondin
            target/release/super-ragondin-gui
          generate_release_notes: true
