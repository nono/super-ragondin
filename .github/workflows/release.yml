name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-system-deps
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: gui-frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: gui-frontend
      - name: Build frontend
        run: pnpm run build
        working-directory: gui-frontend
      - name: Build release binaries
        run: cargo build --release --locked --bin super-ragondin --bin super-ragondin-gui --features super-ragondin-gui/custom-protocol
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/super-ragondin
            target/release/super-ragondin-gui
          generate_release_notes: true
